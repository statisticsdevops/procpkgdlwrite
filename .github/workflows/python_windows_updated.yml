name: Python Windows Updated 3.9 Setup

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python 3.9
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Install minimal tools
      run: |
        pip install pandas openpyxl pipdeptree

    - name: Split requirements based on users
      run: |
        python ./genpylocalreq.py

    - name: Download packages (flat wheelhouse, no deps)
      run: |
        mkdir wheelhouse
        if (Test-Path failed.txt) {
          Remove-Item failed.txt
        }

        foreach ($userDir in Get-ChildItem -Directory) {
          $requirementsFile = "$userDir/requirements_py.txt"

          if (Test-Path $requirementsFile) {
            echo "Processing $userDir..."

            $packages = Get-Content $requirementsFile

            foreach ($pkg in $packages) {
              $pkg = $pkg.Trim()

              if ($pkg -ne "") {

                echo "Downloading $pkg ..."

                pip download $pkg `
                  --dest wheelhouse `
                  --only-binary=:all: `
                  --no-deps `
                  --python-version 39 `
                  --platform win_amd64 `
                  --implementation cp `
                  --abi cp39 `
                2>> failed.txt

              }
            }
          }
        }

    - name: Upload wheelhouse
      uses: actions/upload-artifact@v4
      with:
        name: python-local-packages
        path: wheelhouse/

    - name: Upload failed packages report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: failed-packages
        path: failed.txt
