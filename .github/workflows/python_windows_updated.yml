name: Python Windows Updated 3.9 Setup

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python 3.9
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Install minimal tools
      run: |
        pip install pandas

    - name: Split requirements based on users
      run: |
        python ./genpylocalreq.py

    - name: Download packages WITH dependencies (isolated per package)
      run: |
        mkdir wheelhouse
        if (Test-Path failed.txt) {
          Remove-Item failed.txt
        }

        foreach ($userDir in Get-ChildItem -Directory) {
          $requirementsFile = "$userDir/requirements_py.txt"

          if (Test-Path $requirementsFile) {
            echo "Processing $userDir..."

            $packages = Get-Content $requirementsFile

            foreach ($pkg in $packages) {
              if ($pkg.Trim() -ne "") {

                $pkgName = $pkg.Trim()
                $pkgDir = "wheelhouse/$pkgName"

                mkdir $pkgDir -ErrorAction SilentlyContinue

                echo "Downloading $pkgName and its dependencies..."

                pip download $pkgName `
                  --dest $pkgDir `
                  --only-binary=:all: `
                  --python-version 39 `
                  --platform win_amd64 `
                  --implementation cp `
                  --abi cp39 `
                2>> failed.txt
              }
            }
          }
        }

    - name: Upload wheelhouse
      uses: actions/upload-artifact@v4
      with:
        name: python-local-packages
        path: wheelhouse/

    - name: Upload failure log (if any)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: failed-packages
        path: failed.txt
