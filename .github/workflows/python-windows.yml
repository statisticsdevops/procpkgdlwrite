name: Python Windows Setup

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python 3.9
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'

    - name: Upgrade packaging tools
      run: |
        python -m pip install --upgrade pip setuptools wheel

    - name: Install required packages for script
      run: |
        pip install pandas openpyxl pipdeptree

    - name: Split requirements based on users
      run: |
        python ./genpylocalreq.py

    - name: Download packages dynamically based on user directories
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path wheelhouse | Out-Null
        New-Item -ItemType File -Force -Path failed_packages.txt | Out-Null

        foreach ($userDir in Get-ChildItem -Directory) {
          $requirementsFile = Join-Path $userDir.FullName "requirements_py.txt"

          if (Test-Path $requirementsFile) {
            Write-Host "======================================"
            Write-Host "Processing $($userDir.Name)"
            Write-Host "Using requirements file: $requirementsFile"
            Write-Host "======================================"

            $venvName = "venv_$($userDir.Name)"

            if (Test-Path $venvName) {
              Remove-Item -Recurse -Force $venvName
            }

            python -m venv $venvName
            & ".\$venvName\Scripts\Activate.ps1"

            python -m pip install --upgrade pip setuptools wheel pipdeptree

            Write-Host "Downloading packages and dependencies..."

            pip download -r $requirementsFile --dest=wheelhouse --exists-action=i

            if ($LASTEXITCODE -eq 0) {
              Write-Host "$requirementsFile download successful"

              Write-Host "Installing packages only to generate dependency tree..."
              pip install -r $requirementsFile

              if ($LASTEXITCODE -eq 0) {
                pipdeptree --freeze | Out-File "$($userDir.FullName)\dependency_tree.txt" -Encoding utf8
              } else {
                "$requirementsFile install failed, dependency tree not generated" | Out-File failed_packages.txt -Append -Encoding utf8
              }
            } else {
              "$requirementsFile download failed" | Out-File failed_packages.txt -Append -Encoding utf8
            }

            deactivate

            Remove-Item -Recurse -Force $venvName
          }
        }

    - name: Upload wheelhouse
      uses: actions/upload-artifact@v4
      with:
        name: python-local-packages
        path: wheelhouse/

    - name: Upload failed packages report
      uses: actions/upload-artifact@v4
      with:
        name: failed-packages
        path: failed_packages.txt
