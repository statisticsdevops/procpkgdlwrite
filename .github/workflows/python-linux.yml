name: Python Linux Setup

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python 3.9
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'

    - name: Install tools for generating requirements
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl pipdeptree

    - name: Split requirements based on users
      run: |
        python ./genpylinuxreq.py

    - name: Download packages dynamically based on user directories
      run: |
        mkdir -p wheelhouse

        for userDir in */ ; do
          if [ -d "$userDir" ]; then
            requirementsFile="$userDir/requirements_pylinux.txt"

            if [ -f "$requirementsFile" ]; then
              echo "======================================"
              echo "Processing $userDir"
              echo "Using requirements file: $requirementsFile"
              echo "======================================"

              venvName="venv_${userDir%/}"

              python -m venv "$venvName"
              source "$venvName/bin/activate"

              python -m pip install --upgrade pip

              echo "Downloading packages and dependencies..."
              pip download -r "$requirementsFile" --dest=wheelhouse

              echo "Generating dependency tree for reference only..."
              pip install -r "$requirementsFile"
              pipdeptree --freeze > "$userDir/dependency_tree.txt"

              deactivate
              rm -rf "$venvName"
            fi
          fi
        done

    - name: Upload wheelhouse
      uses: actions/upload-artifact@v4
      with:
        name: python-linux-packages
        path: wheelhouse/
