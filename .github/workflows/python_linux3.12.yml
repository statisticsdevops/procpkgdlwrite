name: Python Linux 3.12 Setup

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python 3.12
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    - name: Create virtual environment
      run: |
        python -m venv venv
        source venv/bin/activate

    - name: Upgrade packaging tools
      run: |
        source venv/bin/activate
        python -m pip install --upgrade pip setuptools wheel

    - name: Install required packages
      run: |
        source venv/bin/activate
        pip install pandas
        pip install openpyxl
        pip install pipdeptree

    - name: Split requirements based on users
      run: |
        source venv/bin/activate
        python ./genpylinuxreq.py

    - name: Download packages dynamically based on user directories
      run: |
        source venv/bin/activate
        mkdir -p wheelhouse
        touch failed_packages.txt

        for userDir in */ ; do
          if [ -d "$userDir" ]; then
            requirementsFile="$userDir/requirements_pylinux.txt"

            if [ -f "$requirementsFile" ]; then
              echo "Processing $userDir's packages..."

              echo "Installing packages individually for $userDir..."

              while read pkg; do
                if [ ! -z "$pkg" ]; then
                  echo "Installing $pkg"
                  pip install --no-deps "$pkg" || echo "$pkg failed (likely Python 3.12 incompatible)" >> failed_packages.txt
                fi
              done < "$requirementsFile"

              echo "Generating dependency tree for $userDir..."
              pipdeptree --freeze > "$userDir/dependency_tree.txt" || true

              echo "Downloading packages for $userDir..."
              pip download -r "$requirementsFile" --dest=wheelhouse || echo "$requirementsFile download failed" >> failed_packages.txt

              pip download -r "$userDir/dependency_tree.txt" --dest=wheelhouse || echo "$userDir dependency download failed" >> failed_packages.txt
            fi
          fi
        done

    - name: Upload wheelhouse
      uses: actions/upload-artifact@v4
      with:
        name: python-linux-packages
        path: wheelhouse/

    - name: Upload failed packages
      uses: actions/upload-artifact@v4
      with:
        name: failed-packages
        path: failed_packages.txt
