name: Python Linux 3.12 Setup

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python 3.12
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    - name: Upgrade pip & wheel
      run: |
        python -m pip install --upgrade pip setuptools wheel

    - name: Split requirements based on users
      run: |
        python ./genpylinuxreq.py

    - name: Download packages dynamically based on user directories
      run: |
        mkdir -p wheelhouse
        touch failed_packages.txt

        for userDir in */ ; do
          if [ -d "$userDir" ]; then
            requirementsFile="$userDir/requirements_pylinux.txt"
            if [ -f "$requirementsFile" ]; then
              echo "Processing $userDir..."

              # Download main packages
              while read pkg; do
                [ -z "$pkg" ] && continue
                echo "Downloading $pkg..."
                pip download "$pkg" --dest=wheelhouse --exists-action=i || echo "$pkg download failed" >> failed_packages.txt
              done < "$requirementsFile"

              # Download dependencies using pipdeptree
              pip install --upgrade pipdeptree >/dev/null 2>&1
              pip install -r "$requirementsFile" >/dev/null 2>&1 || true
              pipdeptree --freeze > "$userDir/dependency_tree.txt" || true

              while read dep; do
                [ -z "$dep" ] && continue
                echo "Downloading dependency $dep..."
                pip download "$dep" --dest=wheelhouse --exists-action=i || echo "$dep download failed" >> failed_packages.txt
              done < "$userDir/dependency_tree.txt"
            fi
          fi
        done

    - name: Upload wheelhouse
      uses: actions/upload-artifact@v4
      with:
        name: python-linux-packages
        path: wheelhouse/

    - name: Upload failed packages
      uses: actions/upload-artifact@v4
      with:
        name: failed-packages
        path: failed_packages.txt
